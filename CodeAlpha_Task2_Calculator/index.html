<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neumorphic Calculator</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>
<body>

<div class="calculator">

    <input type="text" id="display" readonly>

    <div class="buttons">

        <button class="neumorphic" onclick="press(this); clearDisplay()">AC</button>
        <button class="neumorphic" onclick="press(this); toggleSign()">+/-</button>
        <button class="neumorphic" onclick="press(this); appendValue('%')">%</button>
        <button class="neumorphic" onclick="press(this); appendValue('/')">÷</button>

        <button class="neumorphic" onclick="press(this); appendValue('7')">7</button>
        <button class="neumorphic" onclick="press(this); appendValue('8')">8</button>
        <button class="neumorphic" onclick="press(this); appendValue('9')">9</button>
        <button class="neumorphic" onclick="press(this); appendValue('*')">×</button>

        <button class="neumorphic" onclick="press(this); appendValue('4')">4</button>
        <button class="neumorphic" onclick="press(this); appendValue('5')">5</button>
        <button class="neumorphic" onclick="press(this); appendValue('6')">6</button>
        <button class="neumorphic" onclick="press(this); appendValue('-')">−</button>

        <button class="neumorphic" onclick="press(this); appendValue('1')">1</button>
        <button class="neumorphic" onclick="press(this); appendValue('2')">2</button>
        <button class="neumorphic" onclick="press(this); appendValue('3')">3</button>
        <button class="neumorphic" onclick="press(this); appendValue('+')">+</button>

        <button class="neumorphic zero" onclick="press(this); appendValue('0')">0</button>
        <button class="neumorphic" onclick="press(this); appendValue('.')">.</button>
        <button class="neumorphic" onclick="press(this); calculate()">=</button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
